name: Sync fork from upstream

on:
  schedule:
    # Daily 06:00 UTC; merge runs only when day-count % 4 == 0 (~every 4 days).
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Gate (skip scheduled runs except every 4 days)
        id: gate
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual run: always sync."
            exit 0
          fi
          d=$(( $(date -u +%s) / 86400 ))
          if (( d % 4 != 0 )); then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled skip: unix_day=$d (mod 4 != 0)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Scheduled sync: unix_day=$d"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip == 'false'
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge upstream (stakpak/agent)
        if: steps.gate.outputs.skip == 'false'
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/stakpak/agent.git
          git fetch upstream main
          git checkout main
          git merge FETCH_HEAD --no-edit -m "chore: merge upstream stakpak/agent ($(date -u +%Y-%m-%d))"
          git push origin main
